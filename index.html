<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ember's Ascent: 8-Bit RPG</title>
    <style>
        /* CSS: The "Look and Feel" */
        body {
            margin: 0;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #ff4444;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            touch-action: none; /* Prevents mobile zooming while playing */
        }

        #game-container {
            position: relative;
            border: 4px solid #442222;
            background: #000;
        }

        canvas {
            display: block;
            image-rendering: pixelated; /* Forces 8-bit sharpness */
            background: linear-gradient(#1a0a2a, #331144);
        }

        .stats-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 12px;
            text-shadow: 2px 2px #000;
            pointer-events: none;
        }

        /* Mobile Controls - Visible only on small screens */
        #mobile-ui {
            display: none;
            width: 100%;
            max-width: 400px;
            justify-content: space-between;
            padding: 20px;
            margin-top: 10px;
        }

        .btn {
            width: 60px;
            height: 60px;
            background: #333;
            border: 3px solid #666;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .btn:active { background: #662222; }

        @media (max-width: 800px) {
            #mobile-ui { display: flex; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="stats-bar">
            LVL: <span id="ui-lvl">1</span> | 
            SCALES: <span id="ui-scales">0</span><br>
            HP: <progress id="ui-hp" value="100" max="100" style="width:80px;"></progress>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="mobile-ui">
        <div style="display:flex; gap:10px;">
            <div class="btn" id="m-left">←</div>
            <div class="btn" id="m-right">→</div>
        </div>
        <div style="display:flex; gap:10px;">
            <div class="btn" id="m-jump">JMP</div>
            <div class="btn" id="m-atk" style="border-color:#ff4444;">ATK</div>
        </div>
    </div>

<script>
/* JAVASCRIPT: The "Brain" of the Game */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 8-Bit Resolution (Low res, scaled up by CSS)
canvas.width = 320;
canvas.height = 180;

const gameState = {
    gravity: 0.25,
    floorY: 150,
    scrollX: 0
};

const player = {
    x: 50,
    y: 100,
    w: 16,
    h: 18,
    vx: 0,
    vy: 0,
    speed: 2,
    jump: -4.8,
    isGrounded: false,
    level: 1,
    scales: 0,
    hp: 100,
    dir: 1 // 1 for right, -1 for left
};

const magicProjectiles = [];
const keys = {};

// Input Handlers
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

// Mobile Button Logic
const setupBtn = (id, key) => {
    const el = document.getElementById(id);
    el.ontouchstart = (e) => { e.preventDefault(); keys[key] = true; };
    el.ontouchend = (e) => { e.preventDefault(); keys[key] = false; };
};
setupBtn('m-left', 'ArrowLeft');
setupBtn('m-right', 'ArrowRight');
setupBtn('m-jump', 'ArrowUp');
setupBtn('m-atk', 'KeyX');

function shootMagic() {
    magicProjectiles.push({
        x: player.x + (player.dir === 1 ? player.w : 0),
        y: player.y + 8,
        vx: 4 * player.dir,
        life: 40
    });
}

function update() {
    // Horizontal Movement & Running
    let moveSpeed = keys['ShiftLeft'] ? player.speed * 1.7 : player.speed;
    
    if (keys['ArrowRight']) {
        player.vx = moveSpeed;
        player.dir = 1;
    } else if (keys['ArrowLeft']) {
        player.vx = -moveSpeed;
        player.dir = -1;
    } else {
        player.vx *= 0.8; // Friction
    }

    // Jump Logic
    if (keys['ArrowUp'] && player.isGrounded) {
        player.vy = player.jump;
        player.isGrounded = false;
    }

    // Battle Logic (X Key or ATK button)
    if (keys['KeyX']) {
        shootMagic();
        keys['KeyX'] = false; // Semi-auto fire
    }

    // Apply Physics
    player.vy += gameState.gravity;
    player.x += player.vx;
    player.y += player.vy;

    // World Collision (Floor)
    if (player.y + player.h > gameState.floorY) {
        player.y = gameState.floorY - player.h;
        player.vy = 0;
        player.isGrounded = true;
    }

    // Projectile Movement
    magicProjectiles.forEach((p, i) => {
        p.x += p.vx;
        p.life--;
        if (p.life <= 0) magicProjectiles.splice(i, 1);
    });

    // Simple Camera/Scroll effect
    if(player.x > 150) {
        gameState.scrollX -= player.vx;
        player.x = 150;
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Background Detail (Distant Castle Silhouette)
    ctx.fillStyle = "#110011";
    ctx.fillRect(180 + (gameState.scrollX * 0.1), 80, 40, 70);

    // Draw Floor (8-bit style tiles)
    ctx.fillStyle = "#221133";
    ctx.fillRect(0, gameState.floorY, canvas.width, 40);
    ctx.strokeStyle = "#442266";
    ctx.strokeRect(0, gameState.floorY, canvas.width, 1);

    // Draw Player (The Little Demon Girl)
    ctx.fillStyle = "#ff4444"; // Skin/Body
    ctx.fillRect(player.x, player.y, player.w, player.h);
    
    // Eyes
    ctx.fillStyle = "yellow";
    let eyeOffset = player.dir === 1 ? 10 : 2;
    ctx.fillRect(player.x + eyeOffset, player.y + 4, 3, 3);
    
    // Wings/Horns (Tiny 8-bit details)
    ctx.fillStyle = "#aa2222";
    ctx.fillRect(player.x + (player.dir === 1 ? -2 : 14), player.y + 2, 4, 4);

    // Draw Magic Projectiles
    ctx.fillStyle = "#ffaa00";
    magicProjectiles.forEach(p => {
        ctx.fillRect(p.x, p.y, 4, 4);
    });

    // Update UI Elements
    document.getElementById('ui-lvl').innerText = player.level;
    document.getElementById('ui-scales').innerText = player.scales;
    document.getElementById('ui-hp').value = player.hp;
}

// Start the game loop
update();
</script>
</body>
</html>
