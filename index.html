<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8-bit prototype</title>
    <style>
        /* CSS: Retro Aesthetics & Layout */
        body { 
            margin: 0; 
            background: #050505; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            color: #ff4d4d; 
            font-family: 'Courier New', monospace; 
            overflow: hidden; 
            touch-action: none; 
        }

        #game-wrapper { 
            position: relative; 
            border: 4px solid #333; 
            background: #c6ccc9;
        }

        canvas { 
            display: block; 
            image-rendering: pixelated; 
            background: linear-gradient(#07070f, #cc5d21, #e67722); 
        }

        /* Scanline Overlay for CRT look */
        #game-wrapper::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        /* UI Overlays */
        .overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: rgba(0,0,0,0.8); 
            cursor: pointer; 
            text-align: center; 
            z-index: 10;
        }

        .ui-hud { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            font-size: 18px; 
            pointer-events: none; 
            color: #fff; 
            text-shadow: 2px 2px #000; 
            z-index: 5;
        }
        
        /* Volume Control */
        #volume-control { 
            position: absolute; 
            bottom: 10px; 
            right: 10px; 
            background: rgba(0,0,0,0.5); 
            padding: 5px; 
            border-radius: 5px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            color: white; 
            font-size: 12px; 
            z-index: 15;
        }
        
        #mobile-controls { 
            display: none; 
            width: 100%; 
            max-width: 480px; 
            justify-content: space-between; 
            padding: 20px; 
            box-sizing: border-box;
        }

        .control-btn { 
            width: 60px; 
            height: 60px; 
            background: #222; 
            border: 2px solid #555; 
            color: skyblue; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 10px; 
            user-select: none;
        }

        .control-btn:active { background: #551111; border-color: #ff4444; }

        @media (max-width: 850px) { 
            #mobile-controls { display: flex; } 
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-hud">
        HP: <span id="hp-val">100</span> | BOSS: <span id="boss-hp-val">500</span>
    </div>

    <div id="volume-control">
        🔊 <input type="range" id="vol-slider" min="0" max="1" step="0.1" value="0.5">
    </div>

    <div id="title-screen" class="overlay">
        <h1>8-BIT PROTOTYPE</h1>
        <p>TAP / CLICK TO START</p>
    </div>

    <div id="end-screen" class="overlay" style="display: none;">
        <h1 id="end-message">YOU WIN!</h1>
        <p>TAP TO TRY AGAIN</p>
    </div>
</div>

<div id="mobile-controls">
    <div style="display: flex; gap: 15px;">
        <div class="control-btn" id="btn-left">←</div>
        <div class="control-btn" id="btn-right">→</div>
    </div>
    <div style="display: flex; gap: 15px;">
        <div class="control-btn" id="btn-magic" style="color: #ffaa00;">FIRE</div>
        <div class="control-btn" id="btn-jump">JUMP</div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 400;

// Game States: 'TITLE', 'PLAYING', 'FINISHED'
let gameState = 'TITLE';

const config = { gravity: 0.25, groundY: 360 };
const bgMusic = new Audio('audio/Salmodia.mp3'); 
bgMusic.loop = true;

let ember, dragon, magicList, input;

function initGame() {
    ember = { 
        x: 50, 
        y: 300, 
        w: 25, 
        h: 30, 
        vx: 0, 
        vy: 0, 
        speed: 4, 
        jumpStr: -7, 
        isGrounded: false, 
        facing: 1, 
        hp: 100 
    };
    dragon = { 
        x: 600, 
        y: 150, 
        w: 80, 
        h: 80, 
        hp: 500, 
        dir: 1, 
        floatTimer: 0 
    };
    magicList = [];
    input = {};
    document.getElementById('end-screen').style.display = 'none';
    document.getElementById('title-screen').style.display = 'none';
    gameState = 'PLAYING';
    
    // Play music on interaction
    bgMusic.play().catch(e => console.log("Audio waiting for interaction"));
}

// Audio Settings
document.getElementById('vol-slider').addEventListener('input', (e) => {
    bgMusic.volume = e.target.value;
});

// Keyboard Input Handlers
window.onkeydown = (e) => input[e.code] = true;
window.onkeyup = (e) => input[e.code] = false;

// Mobile Helper Function
const bindBtn = (id, key) => {
    const el = document.getElementById(id);
    el.ontouchstart = (e) => { e.preventDefault(); input[key] = true; };
    el.ontouchend = (e) => { e.preventDefault(); input[key] = false; };
};
bindBtn('btn-left', 'ArrowLeft');
bindBtn('btn-right', 'ArrowRight');
bindBtn('btn-jump', 'Space');
bindBtn('btn-magic', 'KeyX');

// Screen Clicking
document.getElementById('title-screen').onclick = initGame;
document.getElementById('end-screen').onclick = initGame;

function update() {
    if (gameState !== 'PLAYING') return;

    // Player Movement
    if (input['ArrowRight']) { 
        ember.vx = ember.speed; 
        ember.facing = 1; 
    }
    else if (input['ArrowLeft']) { 
        ember.vx = -ember.speed; 
        ember.facing = -1; 
    }
    else { 
        ember.vx *= 0.8; 
    }

    // Jumping
    if ((input['Space'] || input['ArrowUp']) && ember.isGrounded) {
        ember.vy = ember.jumpStr;
        ember.isGrounded = false;
    }

    // Cast Magic
    if (input['KeyX']) {
        magicList.push({ 
            x: ember.x + (ember.facing === 1 ? ember.w : -5), 
            y: ember.y + 10, 
            vx: 7 * ember.facing, 
            life: 60 
        });
        input['KeyX'] = false; // Tap to fire
    }

    // Physics
    ember.vy += config.gravity;
    ember.x += ember.vx;
    ember.y += ember.vy;

    // INVISIBLE WALLS (Boundary Check)
    if (ember.x < 0) ember.x = 0;
    if (ember.x + ember.w > canvas.width) ember.x = canvas.width - ember.w;

    // Floor Collision
    if (ember.y + ember.h > config.groundY) {
        ember.y = config.groundY - ember.h;
        ember.vy = 0;
        ember.isGrounded = true;
    }

    // DRAGON BOSS LOGIC
    dragon.floatTimer += 0.05;
    dragon.y += Math.sin(dragon.floatTimer) * 2; // Floating movement

    // Projectile Collision
    magicList.forEach((m, i) => {
        m.x += m.vx;
        if (m.x > dragon.x && m.x < dragon.x + dragon.w && m.y > dragon.y && m.y < dragon.y + dragon.h) {
            dragon.hp -= 10;
            magicList.splice(i, 1);
        }
        if (m.life-- < 0) magicList.splice(i, 1);
    });

    // Boss "Touch" Damage
    if (ember.x < dragon.x + dragon.w && ember.x + ember.w > dragon.x && ember.y < dragon.y + dragon.h && ember.y + ember.h > dragon.y) {
        ember.hp -= 1;
    }

    // Win/Loss Conditions
    if (ember.hp <= 0) endGame("GAME OVER");
    if (dragon.hp <= 0) endGame("YOU WIN!");

    render();
}

function endGame(msg) {
    gameState = 'FINISHED';
    document.getElementById('end-screen').style.display = 'flex';
    document.getElementById('end-message').innerText = msg;
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Ground
    ctx.fillStyle = '#1a3c15';
    ctx.fillRect(0, config.groundY, canvas.width, 40);

    // Character (Ember)
    ctx.fillStyle = "#ff3333";
    ctx.fillRect(ember.x, ember.y, ember.w, ember.h);
    // Eye detail
    ctx.fillStyle = "white";
    let eyePos = ember.facing === 1 ? ember.x + 18 : ember.x + 4;
    ctx.fillRect(eyePos, ember.y + 6, 4, 4);

    // Dragon Boss
    ctx.fillStyle = "#4a1a4a"; // Dark purple dragon
    ctx.fillRect(dragon.x, dragon.y, dragon.w, dragon.h);
    ctx.fillStyle = "#ff0000"; // Boss eye
    ctx.fillRect(dragon.x + 10, dragon.y + 20, 10, 10);

    // Fireballs
    ctx.fillStyle = "#ffaa00";
    magicList.forEach(m => {
        ctx.fillRect(m.x, m.y, 8, 8);
    });

    // Update HUD
    document.getElementById('hp-val').innerText = Math.max(0, Math.floor(ember.hp));
    document.getElementById('boss-hp-val').innerText = Math.max(0, dragon.hp);
}

function loop() {
    update();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
