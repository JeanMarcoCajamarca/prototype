<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ember's Ascent: Red Demon Girl RPG</title>
    <style>
        /* CSS: Retro Aesthetics & Layout */
        body {
            margin: 0;
            background: #050505;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #ff4d4d;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            touch-action: none; /* Crucial for mobile gameplay */
        }

        #game-wrapper {
            position: relative;
            border: 6px solid #331111;
            background: #000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
        }

        canvas {
            display: block;
            image-rendering: pixelated; /* Keeps pixels sharp, not blurry */
            background: linear-gradient(#100010, #220a33);
        }

        /* Scanline Overlay for that CRT TV look */
        #game-wrapper::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .ui-hud {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }

        /* Responsive Mobile Controls */
        #mobile-controls {
            display: none;
            width: 100%;
            max-width: 480px;
            justify-content: space-between;
            padding: 25px;
            box-sizing: border-box;
        }

        .control-btn {
            width: 55px;
            height: 55px;
            background: #222;
            border: 2px solid #555;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            user-select: none;
        }

        .control-btn:active { background: #551111; border-color: #ff4444; }

        @media (max-width: 850px) {
            #mobile-controls { display: flex; }
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div class="ui-hud">
            HP: <span id="hp-val">100</span> | LV: <span id="lv-val">1</span><br>
            SCALES: <span id="sc-val">0</span>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="mobile-controls">
        <div style="display: flex; gap: 15px;">
            <div class="control-btn" id="btn-left">←</div>
            <div class="control-btn" id="btn-right">→</div>
        </div>
        <div style="display: flex; gap: 15px;">
            <div class="control-btn" id="btn-magic" style="color: #ffaa00;">FIRE</div>
            <div class="control-btn" id="btn-jump">JUMP</div>
        </div>
    </div>

<script>
/* JAVASCRIPT: Game Engine & Logic */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Retro Resolution (Standard 16:9 8-bit scale)
canvas.width = 384; 
canvas.height = 216;

const config = {
    gravity: 0.22,
    groundY: 180,
    scrollSpeed: 0
};

const ember = {
    x: 60,
    y: 100,
    w: 18,
    h: 20,
    vx: 0,
    vy: 0,
    speed: 2.2,
    runMult: 1.6,
    jumpStr: -4.8,
    isGrounded: false,
    facing: 1, // 1 is Right, -1 is Left
    hp: 100,
    level: 1,
    scales: 0
};

const magicList = [];
const input = {};

// Keyboard Listeners
window.onkeydown = (e) => input[e.code] = true;
window.onkeyup = (e) => input[e.code] = false;

// Mobile Helper Function
const bindBtn = (id, key) => {
    const el = document.getElementById(id);
    el.ontouchstart = (e) => { e.preventDefault(); input[key] = true; };
    el.ontouchend = (e) => { e.preventDefault(); input[key] = false; };
};
bindBtn('btn-left', 'ArrowLeft');
bindBtn('btn-right', 'ArrowRight');
bindBtn('btn-jump', 'Space');
bindBtn('btn-magic', 'KeyX');

function castMagic() {
    magicList.push({
        x: ember.x + (ember.facing === 1 ? ember.w : -5),
        y: ember.y + 10,
        vx: 5 * ember.facing,
        life: 45
    });
}

function update() {
    // 1. Movement & Sprinting
    let movePower = input['ShiftLeft'] ? ember.speed * ember.runMult : ember.speed;
    
    if (input['ArrowRight']) {
        ember.vx = movePower;
        ember.facing = 1;
    } else if (input['ArrowLeft']) {
        ember.vx = -movePower;
        ember.facing = -1;
    } else {
        ember.vx *= 0.8; // Deceleration/Friction
    }

    // 2. Jumping Logic
    if ((input['Space'] || input['ArrowUp']) && ember.isGrounded) {
        ember.vy = ember.jumpStr;
        ember.isGrounded = false;
    }

    // 3. Battle Mechanic (Magic)
    if (input['KeyX']) {
        castMagic();
        input['KeyX'] = false; // Prevents infinite stream, requires tap
    }

    // Physics Engine
    ember.vy += config.gravity;
    ember.x += ember.vx;
    ember.y += ember.vy;

    // Floor Collision
    if (ember.y + ember.h > config.groundY) {
        ember.y = config.groundY - ember.h;
        ember.vy = 0;
        ember.isGrounded = true;
    }

    // Magic Projectile Life-cycle
    magicList.forEach((m, index) => {
        m.x += m.vx;
        m.life--;
        if (m.life <= 0) magicList.splice(index, 1);
    });

    render();
    requestAnimationFrame(update);
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Ground (8-bit purple/dark brick)
    ctx.fillStyle = "#1a0522";
    ctx.fillRect(0, config.groundY, canvas.width, canvas.height - config.groundY);
    ctx.fillStyle = "#331144";
    ctx.fillRect(0, config.groundY, canvas.width, 2);

    // Draw Ember (The Protagonist)
    // Body
    ctx.fillStyle = "#ff3333";
    ctx.fillRect(ember.x, ember.y, ember.w, ember.h);
    
    // Horns/Wings Detail
    ctx.fillStyle = "#880000";
    ctx.fillRect(ember.x + (ember.facing === 1 ? -2 : 16), ember.y + 2, 4, 4);
    ctx.fillRect(ember.x + 4, ember.y - 3, 3, 4);
    ctx.fillRect(ember.x + 11, ember.y - 3, 3, 4);

    // Eyes
    ctx.fillStyle = "yellow";
    let eyePos = ember.facing === 1 ? ember.x + 12 : ember.x + 3;
    ctx.fillRect(eyePos, ember.y + 5, 3, 3);

    // Draw Magic (Fireballs)
    ctx.fillStyle = "#ffaa00";
    magicList.forEach(m => {
        ctx.fillRect(m.x, m.y, 6, 4);
        // Fire trail
        ctx.fillStyle = "#ff4400";
        ctx.fillRect(m.x - (2 * ember.facing), m.y + 1, 3, 2);
    });

    // Update HUD Stats
    document.getElementById('hp-val').innerText = ember.hp;
    document.getElementById('lv-val').innerText = ember.level;
    document.getElementById('sc-val').innerText = ember.scales;
}

// Kickstart the game
update();
</script>
</body>
</html>
